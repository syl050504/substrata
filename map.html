 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Substrata</title>
</html>
<head>
<style> 
@font-face {
    font-family: "TokytoC";
    src: url("fonts/TokytoC.otf") format("opentype");
}

html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: black;
  }

.hero-card {
  width: 100%;
  background-color: black;
}

.hero-card-img {
  display: grid;  
  justify-items: center;
  width: 100%;
  height: auto;
}

.hero-card-overlay {
  width: 100%;
}
/* shadow effect here */
.spotlight-section {
  position: relative; 
  overflow: hidden;
}

.overlay {
  position: absolute;
  inset: 0;
  pointer-events: none;
  
}

.initiate-prompt {
  position: absolute;
  bottom: 10%;
  left: 50%;
  transform: translateX(-50%);
  text-align: center;
  z-index: 10;
}  

#descend-btn {
  background: transparent;
  color: black;
  padding: 0.5rem 0.5rem;
  font-family: monospace;
  cursor: crosshair;
  border: 1px solid black; /* Initial border */
  border-radius: 4px; /* Optional: add some rounding */
   font-size: 1.5rem;
    font-family: "TokytoC";
}
a{
    text-decoration: none;
}

#descend-btn:hover {
  background: rgba(255,255,255,0.1);
  border: 1px solid white; /* Border on hover */
  border-radius: 4px; /* Optional: add some rounding */
  color: white;
}
</style>
</head>

<body>

 <section class="spotlight-section">
    <div class="hero-card">
      <img class="hero-card-img" src="images/aaa.png" alt="3D">
      <div class="hero-card-overlay"></div>
  </div> 
  <div class="overlay" id="overlay"></div>
  </section>
</section>

<div class="initiate-prompt">
  <a id="descend-btn" href="index.html">descend</a>
</div>

</body>

<script>
  const section = document.querySelector('.spotlight-section');
const overlay = document.getElementById('overlay');

section.addEventListener('mousemove', e => {
  const r = section.getBoundingClientRect();
  const x = ((e.clientX - r.left) / r.width * 100) + '%';
  const y = ((e.clientY - r.top) / r.height * 100) + '%';
  overlay.style.background =
    `radial-gradient(circle 140px at ${x} ${y}, transparent 0%, rgba(0,0,0,0.92) 100%)`;
});

// optional: reset when cursor leaves the section
section.addEventListener('mouseleave', () => {
  overlay.style.background =
    `radial-gradient(circle 140px at 50% 50%, transparent 0%, rgba(0,0,0,0.92) 100%)`;
});
</script>
</html>
